<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 24px 28px; gap: 14px; background: #08100D; border-color: rgba(201,168,76,0.18); }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.btn { font-family: var(--font-eyebrow); font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 14px 28px; border: none; cursor: pointer; transition: all .25s ease; }
.b-gold { background: #C9A84C; color: #08100D; }
.b-ghost { background: transparent; color: #C9A84C; border: 1px solid rgba(201,168,76,0.35); padding: 13px 28px; }
.b-text { background: transparent; color: #F2EDE4; padding: 6px 0; }
.lbl { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: rgba(242,237,228,0.5); }
</style></head><body>
<div class="card dark">
  <div class="lbl">Dark Surface · Programme Buttons</div>
  <div class="row">
    <button class="btn b-gold">Download Programme &nbsp;↓</button>
    <button class="btn b-ghost">View Schedule</button>
    <button class="btn b-text">Press kit &nbsp;→</button>
  </div>
</div>
</body></html>
