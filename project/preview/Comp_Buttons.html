<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 24px 28px; gap: 18px; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn { font-family: var(--font-eyebrow); font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 14px 28px; border: none; cursor: pointer; transition: all .25s cubic-bezier(0.23,1,0.32,1); }
.b-primary { background: var(--wis-green); color: #fff; }
.b-primary:hover { background: #133a23; }
.b-gold { background: var(--wis-gold); color: #1A4D2E; }
.b-gold:hover { background: var(--wis-gold-bright); }
.b-ghost { background: transparent; color: var(--wis-green); border: 1px solid var(--wis-green); }
.b-ghost:hover { background: var(--wis-green); color: #fff; }
.b-text { background: transparent; color: var(--wis-gold-warm); padding: 6px 0; }
.b-text:hover { color: var(--wis-green); }
.b-disabled { background: var(--wis-bg-3); color: var(--wis-text-3); cursor: not-allowed; }
.lbl { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--wis-text-3); flex: 0 0 100%; margin-bottom: -8px; }
</style></head><body>
<div class="card">
  <div class="lbl">Light Surface · Buttons</div>
  <div class="row">
    <button class="btn b-primary">Enquire Now &nbsp;→</button>
    <button class="btn b-gold">Reserve Booth</button>
    <button class="btn b-ghost">View Packages</button>
    <button class="btn b-text">Learn more &nbsp;→</button>
    <button class="btn b-disabled" disabled>Sold</button>
  </div>
</div>
</body></html>
