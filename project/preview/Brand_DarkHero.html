<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; overflow: hidden; background: #08100D; border-color: rgba(201,168,76,0.18); position: relative; min-height: 200px; }
.ring { position: absolute; border: 1px solid rgba(201,168,76,0.18); border-radius: 50%; }
.r1 { width: 360px; height: 360px; right: -120px; top: -100px; }
.r2 { width: 240px; height: 240px; right: -60px; top: -50px; border-color: rgba(201,168,76,0.10); }
.r3 { width: 480px; height: 480px; left: -200px; bottom: -200px; border-color: rgba(201,168,76,0.08); }
.inner { padding: 28px 32px; position: relative; z-index: 1; color: #F2EDE4; }
.eb { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 5px; font-weight: 600; text-transform: uppercase; color: rgba(201,168,76,0.7); }
.line { width: 32px; height: 1px; background: var(--wis-gold); margin: 12px 0; }
.title { font-family: var(--font-display); font-size: 34px; font-weight: 300; line-height: 1; margin-bottom: 6px; }
.title em { font-style: italic; color: var(--wis-gold); }
.sub { font-family: var(--font-sans-alt); font-size: 12px; letter-spacing: 0.5px; color: rgba(242,237,228,0.6); }
.foot { font-family: var(--font-mono); font-size: 10px; color: rgba(242,237,228,0.4); margin-top: 14px; }
</style></head><body>
<div class="card dark">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <div class="inner">
    <div class="eb">World Investment Summit</div>
    <div class="line"></div>
    <div class="title">Programme <em>Hero</em></div>
    <div class="sub">24 – 26 June 2026 · Bola Ahmed Tinubu International Conference Centre</div>
    <div class="foot">Dark surface · two large border-only orbital rings rotate slowly (40s, 28s opposite directions, 6–8% opacity). No shadow elevation.</div>
  </div>
</div>
</body></html>
