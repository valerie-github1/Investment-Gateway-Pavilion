<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px; background: var(--wis-bg); gap: 16px; }
.row { display: flex; gap: 14px; align-items: center; }
.tile { flex: 1; height: 96px; background: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--wis-text); }
.lbl { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); text-align: center; }
.col { display: flex; flex-direction: column; gap: 6px; flex: 1; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="col"><div class="tile" style="box-shadow:none;border:1px solid rgba(26,77,46,0.08)">Flat</div><div class="lbl">none · resting flat</div></div>
    <div class="col"><div class="tile" style="box-shadow:0 2px 20px rgba(26,77,46,0.06)">Card</div><div class="lbl">--sh-card · 2/20/.06 green</div></div>
    <div class="col"><div class="tile" style="box-shadow:0 8px 32px rgba(26,77,46,0.12)">Hover</div><div class="lbl">--sh-card-hov · 8/32/.12</div></div>
    <div class="col"><div class="tile" style="box-shadow:0 20px 60px rgba(0,0,0,0.15);border-top:3px solid #1A4D2E">Tooltip</div><div class="lbl">--sh-tooltip · 20/60/.15</div></div>
  </div>
</div>
</body></html>
