<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px 32px; background: var(--wis-green); border: none; color: #fff; }
.row { display: flex; align-items: stretch; gap: 0; }
.stat { flex: 1; padding: 8px 14px; border-right: 1px solid rgba(201,168,76,0.25); display: flex; flex-direction: column; gap: 8px; }
.stat:last-child { border-right: none; }
.num { font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--wis-gold); line-height: 1; font-feature-settings: "lnum" 1; }
.lbl { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.7); }
.foot { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 14px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="stat"><div class="num">8,000+</div><div class="lbl">Global Delegates</div></div>
    <div class="stat"><div class="num">60+</div><div class="lbl">Nations</div></div>
    <div class="stat"><div class="num">3</div><div class="lbl">Full Days</div></div>
    <div class="stat"><div class="num">₦750k</div><div class="lbl">From</div></div>
  </div>
  <div class="foot">Cormorant Garamond 700 · lining figures · gold on green is canonical · brand signature</div>
</div>
</body></html>
