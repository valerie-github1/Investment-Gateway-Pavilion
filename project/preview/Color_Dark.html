<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; background: #08100D; border-color: rgba(201,168,76,0.18); overflow: hidden; }
.inner { padding: 24px 28px; position: relative; }
.eb { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(201,168,76,0.7); }
.h { font-family: var(--font-display); font-style: italic; font-size: 40px; color: #C9A84C; margin: 6px 0 14px; line-height: 1; }
.row { display: flex; gap: 8px; }
.sw { flex: 1; aspect-ratio: 1.4; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(201,168,76,0.18); }
.name { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: #F2EDE4; }
.hex { font-family: var(--font-mono); font-size: 10px; color: rgba(242,237,228,0.6); }
.ring { position: absolute; right: -80px; top: -80px; width: 200px; height: 200px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.18); }
.ring2 { position: absolute; right: -50px; top: -50px; width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.10); }
</style></head><body>
<div class="card dark">
  <div class="inner">
    <div class="ring"></div><div class="ring2"></div>
    <div class="eb">Dark Surface · Programme</div>
    <div class="h">Ceremonial</div>
    <div class="row">
      <div class="sw" style="background:#08100D"><div class="name">Dark</div><div class="hex">#08100D</div></div>
      <div class="sw" style="background:#0E1A14"><div class="name">Surface</div><div class="hex">#0E1A14</div></div>
      <div class="sw" style="background:#111C16"><div class="name">Card</div><div class="hex">#111C16</div></div>
      <div class="sw" style="background:rgba(242,237,228,0.06)"><div class="name">Faint</div><div class="hex">α 0.06</div></div>
    </div>
  </div>
</div>
</body></html>
