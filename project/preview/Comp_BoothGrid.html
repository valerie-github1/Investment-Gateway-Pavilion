<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 24px 28px; gap: 14px; background: var(--wis-bg); }
.row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.booth { aspect-ratio: 1; padding: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: 1.5px solid; cursor: pointer; transition: transform .25s ease; }
.booth:hover { transform: scale(1.04); }
.booth .id { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 1.5px; font-weight: 700; }
.booth .ti { font-family: var(--font-eyebrow); font-size: 7px; letter-spacing: 1.5px; opacity: 0.7; text-transform: uppercase; }
.b-em { background: #f0f9f5; border-color: #0d6b45; color: #0d6b45; }
.b-sa { background: #f0f4fc; border-color: #1a4fa0; color: #1a4fa0; }
.b-ru { background: #fdf0f2; border-color: #8f1a2e; color: #8f1a2e; }
.b-am { background: #fef5ec; border-color: #b85e0a; color: #b85e0a; }
.b-op { background: #f7f0fd; border-color: #5a2a8a; color: #5a2a8a; }
.b-to { background: #f0fafa; border-color: #0a7a7a; color: #0a7a7a; }
.b-em.sel { background: #0d6b45; color: #fff; }
.aisle { display: flex; align-items: center; gap: 14px; padding: 8px 0; }
.aisle::before, .aisle::after { content: ''; flex: 1; height: 1px; background: var(--wis-border); }
.aisle span { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 3px; color: var(--wis-text-3); text-transform: uppercase; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="booth b-em"><div class="id">E1</div><div class="ti">Emerald</div></div>
    <div class="booth b-em sel"><div class="id">E2</div><div class="ti">Selected</div></div>
    <div class="booth b-sa"><div class="id">S1</div><div class="ti">Sapphire</div></div>
    <div class="booth b-ru"><div class="id">R1</div><div class="ti">Ruby</div></div>
    <div class="booth b-am"><div class="id">A1</div><div class="ti">Amber</div></div>
    <div class="booth b-op"><div class="id">O1</div><div class="ti">Opal</div></div>
  </div>
  <div class="aisle"><span>Central Networking Aisle</span></div>
  <div class="row">
    <div class="booth b-to"><div class="id">T1</div><div class="ti">Topaz</div></div>
    <div class="booth b-em"><div class="id">E3</div><div class="ti">Emerald</div></div>
    <div class="booth b-sa"><div class="id">S2</div><div class="ti">Sapphire</div></div>
    <div class="booth b-ru"><div class="id">R2</div><div class="ti">Ruby</div></div>
    <div class="booth b-am"><div class="id">A2</div><div class="ti">Amber</div></div>
    <div class="booth b-op"><div class="id">O2</div><div class="ti">Opal</div></div>
  </div>
</div>
</body></html>
