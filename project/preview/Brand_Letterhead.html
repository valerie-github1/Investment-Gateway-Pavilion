<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; overflow: hidden; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.tile { aspect-ratio: 1.4; overflow: hidden; }
.tile img { width: 100%; height: 100%; object-fit: cover; }
.foot { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); padding: 12px 28px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="tile"><img src="../assets/wis-letterhead-1.jpg" alt="Letterhead 1"/></div>
    <div class="tile"><img src="../assets/wis-letterhead-2.jpg" alt="Letterhead 2"/></div>
  </div>
  <div class="foot">assets/wis-letterhead-1.jpg · wis-letterhead-2.jpg — official letterhead reference for typesetting + ceremonial layouts</div>
</div>
</body></html>
