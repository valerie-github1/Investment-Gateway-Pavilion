<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; background: var(--wis-green); border: none; overflow: hidden; position: relative; min-height: 180px; }
.bg { position: absolute; inset: 0; background-image:
    radial-gradient(ellipse at top right, rgba(201,168,76,0.18), transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(201,168,76,0.08), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 60px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 60px);
}
.inner { position: relative; padding: 32px 36px; color: #fff; }
.eb { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; color: var(--wis-gold); }
.title { font-family: var(--font-display); font-size: 48px; font-weight: 300; line-height: 1; margin: 10px 0 12px; }
.title em { font-style: italic; color: var(--wis-gold); }
.sub { font-family: var(--font-sans); font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85); max-width: 460px; }
.foot { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 14px; }
</style></head><body>
<div class="card">
  <div class="bg"></div>
  <div class="inner">
    <div class="eb">★ The Premier Investment Event of 2026</div>
    <div class="title">Investment <em>Gateway</em> Pavilion</div>
    <div class="sub">Showcase your brand at Africa's most prestigious summit. 8,000+ delegates · 60+ nations · 3 full days.</div>
    <div class="foot">Light hero pattern · flat green + gold radial vignettes + 60×60 px white grid at 1.5% opacity</div>
  </div>
</div>
</body></html>
