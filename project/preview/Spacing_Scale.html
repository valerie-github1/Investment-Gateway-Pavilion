<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 24px; gap: 12px; }
.row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
.token { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); flex: 0 0 50px; }
.bar { background: var(--wis-green); height: 14px; }
.px { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text); flex: 0 0 38px; }
.use { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--wis-text-3); flex: 1; }
</style></head><body>
<div class="card">
  <div class="row"><div class="token">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4</div><div class="use">Hairline · chip inset</div></div>
  <div class="row"><div class="token">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8</div><div class="use">Icon-text gap</div></div>
  <div class="row"><div class="token">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12</div><div class="use">Compact list rows</div></div>
  <div class="row"><div class="token">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16</div><div class="use">Card inner padding micro</div></div>
  <div class="row"><div class="token">--space-5</div><div class="bar" style="width:24px"></div><div class="px">24</div><div class="use">Card padding · gap</div></div>
  <div class="row"><div class="token">--space-6</div><div class="bar" style="width:32px"></div><div class="px">32</div><div class="use">Section internal pad</div></div>
  <div class="row"><div class="token">--space-7</div><div class="bar" style="width:48px"></div><div class="px">48</div><div class="use">Module separation</div></div>
  <div class="row"><div class="token">--space-8</div><div class="bar" style="width:64px"></div><div class="px">64</div><div class="use">Vertical section pad</div></div>
  <div class="row"><div class="token">--space-9</div><div class="bar" style="width:90px"></div><div class="px">90</div><div class="use">Hero · large band</div></div>
</div>
</body></html>
