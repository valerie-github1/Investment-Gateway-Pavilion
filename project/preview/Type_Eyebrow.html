<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px 32px; gap: 14px; }
.row1 { display: flex; align-items: center; gap: 28px; }
.eb-xs { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.5px; font-weight: 600; text-transform: uppercase; color: var(--wis-text-3); }
.eb-sm { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; color: var(--wis-gold-warm); }
.eb-md { font-family: var(--font-eyebrow); font-size: 12px; letter-spacing: 5px; font-weight: 600; text-transform: uppercase; color: var(--wis-green); }
.eb-lg { font-family: var(--font-eyebrow); font-size: 14px; letter-spacing: 6px; font-weight: 700; text-transform: uppercase; color: var(--wis-text); }
.row { display: flex; flex-direction: column; gap: 4px; padding-bottom: 10px; border-bottom: 1px solid var(--wis-border-2); }
.row:last-child { border: none; padding-bottom: 0; }
.spec { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); }
</style></head><body>
<div class="card">
  <div class="row"><div class="eb-xs">METADATA · BREADCRUMB</div><div class="spec">9px · 2.5px tracking · text-3</div></div>
  <div class="row"><div class="eb-sm">EXHIBITION LAYOUT</div><div class="spec">10px · 4px tracking · gold-warm</div></div>
  <div class="row"><div class="eb-md">WORLD PRESS CONFERENCE</div><div class="spec">12px · 5px tracking · green</div></div>
  <div class="row"><div class="eb-lg">WIS · ABUJA · 2026</div><div class="spec">14px · 6px tracking · text</div></div>
</div>
</body></html>
