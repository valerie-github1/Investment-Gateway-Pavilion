<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px; background: var(--wis-bg); align-items: center; text-align: center; }
.eb { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; color: var(--wis-gold-warm); }
.title { font-family: var(--font-display); font-size: 44px; font-weight: 300; line-height: 1; margin: 10px 0 14px; color: var(--wis-text); }
.title em { font-style: italic; color: var(--wis-green); }
.div { width: 1px; height: 56px; background: linear-gradient(180deg, transparent, var(--wis-gold), transparent); margin: 0 auto 14px; }
.sub { font-family: var(--font-sans); font-size: 14px; line-height: 1.65; color: var(--wis-text-2); max-width: 480px; }
.note { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); margin-top: 12px; }
</style></head><body>
<div class="card">
  <div class="eb">Exhibition Layout</div>
  <div class="title">Pavilion <em>Floor</em> Plan</div>
  <div class="div"></div>
  <div class="sub">An interactive layout of the Investment Gateway Pavilion — hover over any booth for details.</div>
  <div class="note">eyebrow → display title → 1px gold gradient divider → subtitle · canonical section header</div>
</div>
</body></html>
