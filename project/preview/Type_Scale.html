<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 24px 28px; gap: 6px; }
.line { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--wis-border-2); }
.line:last-child { border: none; }
.spec { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); flex: 0 0 130px; }
.h1 { font-family: var(--font-display); font-weight: 300; font-size: 44px; line-height: 1; }
.h2 { font-family: var(--font-display); font-weight: 600; font-size: 32px; line-height: 1; }
.h3 { font-family: var(--font-display); font-weight: 300; font-size: 22px; line-height: 1; }
.h4 { font-family: var(--font-display); font-weight: 500; font-size: 18px; line-height: 1; }
.bd { font-family: var(--font-sans); font-size: 14px; }
.eb { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; }
em { color: var(--wis-gold); font-style: italic; }
</style></head><body>
<div class="card">
  <div class="line"><div class="spec">H1 · 50–94</div><div class="h1">Pavilion <em>Floor</em> Plan</div></div>
  <div class="line"><div class="spec">H2 · 36–72</div><div class="h2">Exhibition <em>Packages</em></div></div>
  <div class="line"><div class="spec">H3 · 28–46</div><div class="h3">Maximise Your Presence</div></div>
  <div class="line"><div class="spec">H4 · 20–28</div><div class="h4">Important Note</div></div>
  <div class="line"><div class="spec">Body · 14</div><div class="bd">Showcase your brand at the most prestigious summit.</div></div>
  <div class="line"><div class="spec">Eyebrow · 10</div><div class="eb">Exhibition Layout</div></div>
</div>
</body></html>
