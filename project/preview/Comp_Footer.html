<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; background: var(--wis-green); border: none; overflow: hidden; }
.foot { padding: 36px 32px 24px; color: rgba(255,255,255,0.85); position: relative; }
.foot::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--wis-green), var(--wis-gold), var(--wis-green)); }
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.lock { width: 36px; height: 36px; border-radius: 50%; background: var(--wis-green); border: 1px solid var(--wis-gold); color: var(--wis-gold); font-family: var(--font-display); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.title { font-family: var(--font-eyebrow); font-size: 13px; letter-spacing: 4.5px; font-weight: 700; text-transform: uppercase; color: var(--wis-gold); }
.row { display: flex; gap: 32px; }
.col { flex: 1; }
.lbl { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--wis-gold); margin-bottom: 8px; }
.body { font-family: var(--font-sans); font-size: 12px; line-height: 1.7; color: rgba(255,255,255,0.85); }
.fine { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(201,168,76,0.2); }
</style></head><body>
<div class="card">
  <div class="foot">
    <div class="brand"><div class="lock">W</div><div class="title">WIS · Abuja · 2026</div></div>
    <div class="row">
      <div class="col"><div class="lbl">Venue</div><div class="body">Bola Ahmed Tinubu International Conference Centre · Abuja, Nigeria</div></div>
      <div class="col"><div class="lbl">Dates</div><div class="body">24 – 26 June 2026 · Three full days</div></div>
      <div class="col"><div class="lbl">Exhibitions</div><div class="body">exhibitions@wisabuja2026.gov.ng</div></div>
    </div>
    <div class="fine">© World Investment Summit · Abuja 2026 · Federal Government of Nigeria</div>
  </div>
</div>
</body></html>
