<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 24px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; aspect-ratio: 1.4; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.name { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; }
.hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
.foot { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#08100D;color:#fff"><div class="name">Deep</div><div class="hex">#08100D</div></div>
    <div class="swatch" style="background:#1A4731;color:#fff"><div class="name">Green Deep</div><div class="hex">#1A4731</div></div>
    <div class="swatch" style="background:#1A4D2E;color:#fff"><div class="name">Green ★</div><div class="hex">#1A4D2E</div></div>
    <div class="swatch" style="background:#215C3E;color:#fff"><div class="name">Mid</div><div class="hex">#215C3E</div></div>
    <div class="swatch" style="background:#2D7A52;color:#fff"><div class="name">Light</div><div class="hex">#2D7A52</div></div>
    <div class="swatch" style="background:#E8F5EE;color:#1A4D2E"><div class="name">Pale</div><div class="hex">#E8F5EE</div></div>
  </div>
  <div class="foot">★ canonical brand green — hero, CTA, footer, sticky-nav-on-scroll</div>
</div>
</body></html>
