<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 24px 28px; gap: 16px; background: var(--wis-bg); }
.row { display: flex; gap: 18px; align-items: center; }
.lock { width: 110px; height: 110px; flex: 0 0 110px; border-radius: 50%; background: #fff; padding: 6px; box-shadow: 0 0 0 6px rgba(212,168,68,0.12), 0 16px 48px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.lock img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
.col { flex: 1; }
.eb { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--wis-gold-warm); margin-bottom: 4px; }
.title { font-family: var(--font-display); font-style: italic; font-size: 26px; color: var(--wis-text); line-height: 1; margin-bottom: 8px; }
.body { font-family: var(--font-sans); font-size: 12px; line-height: 1.55; color: var(--wis-text-2); margin-bottom: 6px; }
.note { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="lock"><img src="../assets/wis-logo.jpg" alt="WIS logo"/></div>
    <div class="col">
      <div class="eb">Master Lockup</div>
      <div class="title">WIS Logo · Circle Crop</div>
      <div class="body">Coat of Arms inside green wing wreath. Use full lockup at ≥120 px. Crop to circle for hero badge with 6 px gold ring.</div>
      <div class="note">assets/wis-logo.jpg · never extracted, never re-drawn, treat as single artwork</div>
    </div>
  </div>
</div>
</body></html>
