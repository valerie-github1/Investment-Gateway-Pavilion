<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 24px; }
.row { display: flex; gap: 8px; }
.sw { flex: 1; aspect-ratio: 1.5; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--wis-border-2); }
.name { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--wis-text); }
.hex { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); }
.foot { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); margin-top: 10px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#FFFFFF"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#F7F6F1"><div class="name">BG ★</div><div class="hex">#F7F6F1</div></div>
    <div class="sw" style="background:#EFEDE5"><div class="name">BG-2</div><div class="hex">#EFEDE5</div></div>
    <div class="sw" style="background:#E8E5DB"><div class="name">BG-3</div><div class="hex">#E8E5DB</div></div>
    <div class="sw" style="background:#4A4A52;color:#fff"><div class="name" style="color:#fff">Text-2</div><div class="hex" style="color:rgba(255,255,255,0.7)">#4A4A52</div></div>
    <div class="sw" style="background:#18181B;color:#fff"><div class="name" style="color:#fff">Text</div><div class="hex" style="color:rgba(255,255,255,0.7)">#18181B</div></div>
  </div>
  <div class="foot">★ default page bg — three cream layers stack for section depth without gradients</div>
</div>
</body></html>
