<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px 32px; gap: 8px; }
.eyebrow { font-family: var(--font-eyebrow); font-size: 10px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; color: var(--wis-gold-warm); }
.title { font-family: var(--font-display); font-size: 64px; font-weight: 300; line-height: 0.95; letter-spacing: -1px; margin: 6px 0 0; }
.title em { font-style: italic; color: var(--wis-gold); }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); margin-top: 14px; letter-spacing: 0.4px;}
</style></head><body>
<div class="card">
  <div class="eyebrow">Display Headline</div>
  <div class="title">Investment <em>Gateway</em></div>
  <div class="meta">Cormorant Garamond · 300 / 600 italic accent · clamp(50, 8vw, 94)px · tracking −1px · line 0.95</div>
</div>
</body></html>
