<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 24px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; aspect-ratio: 1.4; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.name { font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; }
.hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.9; }
.foot { font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#B8902A;color:#fff"><div class="name">Warm</div><div class="hex">#B8902A</div></div>
    <div class="swatch" style="background:#C9A84C;color:#1a1a1a"><div class="name">Gold ★</div><div class="hex">#C9A84C</div></div>
    <div class="swatch" style="background:#D4A844;color:#1a1a1a"><div class="name">Light</div><div class="hex">#D4A844</div></div>
    <div class="swatch" style="background:#E8C96A;color:#3a2c00"><div class="name">Bright</div><div class="hex">#E8C96A</div></div>
    <div class="swatch" style="background:#FBF4E3;color:#7a5e00"><div class="name">Pale</div><div class="hex">#FBF4E3</div></div>
  </div>
  <div class="foot">★ canonical accent — display italic emphasis, eyebrow on cream, ring, divider gradients</div>
</div>
</body></html>
