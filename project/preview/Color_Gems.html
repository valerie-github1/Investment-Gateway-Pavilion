<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 24px; gap: 14px; }
.tier { display: flex; gap: 8px; align-items: stretch; }
.deep, .lt { padding: 10px 12px; font-family: var(--font-eyebrow); font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: #fff; flex: 0 0 auto; min-width: 110px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.deep .h, .lt .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.8; letter-spacing: 0; }
.bg { flex: 1; padding: 10px 12px; font-family: var(--font-mono); font-size: 10px; color: var(--wis-text-3); display: flex; align-items: center; }
</style></head><body>
<div class="card">
  <div class="tier"><div class="deep" style="background:#0d6b45">Emerald<span class="h">#0d6b45</span></div><div class="lt"  style="background:#12a066">Light<span class="h">#12a066</span></div><div class="bg" style="background:#f0f9f5">#f0f9f5</div></div>
  <div class="tier"><div class="deep" style="background:#1a4fa0">Sapphire<span class="h">#1a4fa0</span></div><div class="lt"  style="background:#3a7fd4">Light<span class="h">#3a7fd4</span></div><div class="bg" style="background:#f0f4fc">#f0f4fc</div></div>
  <div class="tier"><div class="deep" style="background:#8f1a2e">Ruby<span class="h">#8f1a2e</span></div><div class="lt"  style="background:#d4405a">Light<span class="h">#d4405a</span></div><div class="bg" style="background:#fdf0f2">#fdf0f2</div></div>
  <div class="tier"><div class="deep" style="background:#b85e0a">Amber<span class="h">#b85e0a</span></div><div class="lt"  style="background:#e8902a">Light<span class="h">#e8902a</span></div><div class="bg" style="background:#fef5ec">#fef5ec</div></div>
  <div class="tier"><div class="deep" style="background:#5a2a8a">Opal<span class="h">#5a2a8a</span></div><div class="lt"  style="background:#9b5fd4">Light<span class="h">#9b5fd4</span></div><div class="bg" style="background:#f7f0fd">#f7f0fd</div></div>
  <div class="tier"><div class="deep" style="background:#0a7a7a">Topaz<span class="h">#0a7a7a</span></div><div class="lt"  style="background:#20c0c0">Light<span class="h">#20c0c0</span></div><div class="bg" style="background:#f0fafa">#f0fafa</div></div>
</div>
</body></html>
